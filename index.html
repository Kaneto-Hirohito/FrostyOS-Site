<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrostyOS — AIをあなたの型に整える</title>
  <meta name="description" content="FrostyOS — たった数十行の定義でAIの出力が劇的に変わる。無料でダウンロード。" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:       #0d0f14;
      --surface:  #151820;
      --border:   #1e2330;
      --accent:   #4fc3f7;
      --accent2:  #38b2e0;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --glow:     rgba(79, 195, 247, 0.15);
    }
 
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
 
    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
 
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 3rem 1.5rem;
      width: 100%;
      max-width: 520px;
    }
 
    /* ── logo / header ── */
    .logo-area {
      text-align: center;
    }
 
    .logo-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 3px 10px;
      margin-bottom: 1rem;
      opacity: 0.85;
    }
 
    h1 {
      font-size: clamp(2.2rem, 8vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #ffffff;
    }
 
    h1 span {
      color: var(--accent);
    }
 
    .tagline {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.6;
    }
 
    /* ── QR card ── */
    .qr-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      width: 100%;
      box-shadow: 0 0 40px var(--glow);
      transition: box-shadow 0.3s;
    }
 
    .qr-card:hover {
      box-shadow: 0 0 60px rgba(79, 195, 247, 0.25);
    }
 
    .qr-label {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
 
    .qr-wrapper {
      display: inline-block;
      background: #ffffff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 1.25rem;
    }
 
    .qr-wrapper img {
      display: block;
      width: 180px;
      height: 180px;
    }
 
    .qr-caption {
      font-size: 0.82rem;
      color: var(--muted);
    }
 
    /* ── buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
    }
 
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
 
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
    }
 
    .btn-primary:hover {
      background: #7dd8fa;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(79, 195, 247, 0.35);
    }
 
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
 
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
 
    /* GitHub icon */
    .icon-gh {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
 
    /* ── footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding-bottom: 2rem;
    }
 
    footer a {
      color: var(--muted);
      text-decoration: none;
    }
 
    footer a:hover {
      color: var(--accent);
    }
 
    /* ── responsive ── */
    @media (max-width: 400px) {
      .qr-wrapper img { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>
 
<main>
 
  <div class="logo-area">
    <div class="logo-badge">v7.5</div>
    <h1>Frosty<span>OS</span></h1>
    <p class="tagline">たった数十行の定義で、<br>AIの出力が劇的に変わる。</p>
  </div>
 
  <div class="qr-card">
    <p class="qr-label">Download via QR Code</p>
    <div class="qr-wrapper">
      <!--
        QR code points to GitHub Releases page.
        Replace the ?data= URL if the release URL changes.
      -->
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=0&data=https%3A%2F%2Fgithub.com%2FKaneto-Hirohito%2FFrostyOS%2Freleases"
        alt="FrostyOS ダウンロード QRコード"
        width="180"
        height="180"
        loading="lazy"
      />
    </div>
    <p class="qr-caption">カメラで読み取るとダウンロードページへ</p>
  </div>
 
  <div class="btn-group">
    <a class="btn btn-primary" href="https://github.com/Kaneto-Hirohito/FrostyOS/releases" target="_blank" rel="noopener">
      ダウンロード（最新版）
    </a>
    <a class="btn btn-secondary" href="https://github.com/Kaneto-Hirohito/FrostyOS" target="_blank" rel="noopener">
      <svg class="icon-gh" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.42 7.86 10.95.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.2 1.77 1.2 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 2.87-.39c.97 0 1.95.13 2.87.39 2.19-1.49 3.14-1.18 3.14-1.18.63 1.58.23 2.75.11 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.7 5.39-5.26 5.67.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.56C20.21 21.42 23.5 17.1 23.5 12 23.5 5.65 18.35.5 12 .5z"/>
      </svg>
      GitHub で見る
    </a>
  </div>
 
</main>
 
<footer>
  <p>© 2026 FrostyOS &nbsp;·&nbsp; <a href="https://github.com/Kaneto-Hirohito/FrostyOS" target="_blank" rel="noopener">GitHub</a></p>
</footer>
 
</body>
</html>
